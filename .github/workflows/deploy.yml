name: Deploy OA Prototype

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: oa-ui
        run: |
          rm -f .npmrc package-lock.json
          npm install -g npm@10.8.2
          npm install --registry=https://registry.npmjs.org/ --no-audit --no-fund --progress=false

      - name: Build
        working-directory: oa-ui
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: oa-ui/dist
